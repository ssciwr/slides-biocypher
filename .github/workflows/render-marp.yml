name: Render Marp slides

on:
  push:

permissions:
  contents: read

jobs:
  render:
    name: Render Marp HTML artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci

      - name: Find Marp markdown files
        id: marp
        shell: bash
        run: |
          set -euo pipefail

          files="marp-files.txt"
          : > "$files"
          found=false

          while IFS= read -r -d '' file; do
            if grep -q 'marp: true' "$file"; then
              printf '%s\0' "$file" >> "$files"
              found=true
            fi
          done < <(find . -type f -name '*.md' -print0)

          echo "found=$found" >> "$GITHUB_OUTPUT"

      - name: Render HTML beside each deck
        if: steps.marp.outputs.found == 'true'
        shell: bash
        run: |
          set -euo pipefail

          artifact_dir="$RUNNER_TEMP/marp-html-artifacts"
          mkdir -p "$artifact_dir"
          while IFS= read -r -d '' file; do
            output="${file%.md}.html"
            artifact_output="$artifact_dir/${output#./}"
            npm exec marp "$file" --html --allow-local-files -o "$output"

            mkdir -p "$(dirname "$artifact_output")"
            cp "$output" "$artifact_output"
          done < marp-files.txt

      - name: Upload rendered HTML
        if: steps.marp.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: marp-html
          path: ${{ runner.temp }}/marp-html-artifacts
          if-no-files-found: error
